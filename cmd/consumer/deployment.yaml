apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-consumer
  namespace: smap
  labels:
    app: identity-consumer
    app.kubernetes.io/part-of: smap
    app.kubernetes.io/component: consumer
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: identity-consumer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: identity-consumer
        app.kubernetes.io/part-of: smap
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: identity-consumer
          image: registry.tantai.dev/smap/identity-consumer:260310-221701
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: identity-config
            - secretRef:
                name: identity-secrets
          env:
            - name: CONTAINER_NAME
              value: "identity-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep -v grep | grep -q consumer
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
