apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-config
  namespace: smap
  labels:
    app: identity-api
data:
  # HTTP Server Configuration
  HOST: "0.0.0.0"
  APP_PORT: "8080"
  API_MODE: "release"

  # Logger Configuration
  LOGGER_LEVEL: "info"
  LOGGER_MODE: "production"
  LOGGER_ENCODING: "json"
  LOGGER_COLOR_ENABLED: "false"

  # SMTP Configuration (non-sensitive)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@smap.com"
  SMTP_FROM_NAME: "SMAP"

  # Cookie Configuration (for HttpOnly authentication)
  COOKIE_DOMAIN: ".tantai.dev"
  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "None"
  COOKIE_MAX_AGE: "7200"
  COOKIE_MAX_AGE_REMEMBER: "2592000"
  COOKIE_NAME: "smap_auth_token"

  ENV: "production"

  # PostgreSQL Configuration
  POSTGRES_HOST: "172.16.19.10"
  POSTGRES_PORT: "5432"
  POSTGRES_DBNAME: "smap"
  POSTGRES_SSLMODE: "disable"
  POSTGRES_SCHEMA: "schema_identity"

  # Redis Configuration (in-cluster service)
  REDIS_HOST: "redis-client.infrastructure.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Kafka Configuration
  KAFKA_BROKERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  # Access Control Configuration
  ACCESS_CONTROL_ALLOWED_DOMAINS: "gmail.com,hcmut.edu.vn"

