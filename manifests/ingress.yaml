# Traefik Middleware for stripping /identity prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: identity-stripprefix
  namespace: smap
spec:
  stripPrefix:
    prefixes:
      - /identity

---
# Traefik IngressRoute for identity API
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: identity-ingress
  namespace: smap
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: smap
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`smap-api.tantai.dev`) && PathPrefix(`/identity`)
      kind: Rule
      services:
        - name: identity-api
          port: 80
      middlewares:
        - name: identity-stripprefix
